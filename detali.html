        .ingredient-amount { font-weight: 700; color: #dc2626; }

        .not-found { text-align: center; padding: 80px 20px; color: #94a3b8; }

function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

function renderNotFound() {
    document.getElementById("pageContent").innerHTML = `
        <div class="not-found">
            <h2>😔 Рецепт не найден</h2>
            <p>Возможно, он был удалён или ссылка некорректна.</p>
            <a href="index.html" style="color:#dc2626;font-weight:700;">← Вернуться к списку</a>
        </div>`;
}

function toggleFav(id) {
    const btn = document.getElementById("favBtn");
    const favs = JSON.parse(localStorage.getItem("favs")||"[]");
    const idx = favs.indexOf(id);
    if (idx === -1) { favs.push(id); btn.classList.add("active"); btn.innerHTML = "❤️ В избранном"; }
    else { favs.splice(idx,1); btn.classList.remove("active"); btn.innerHTML = "🤍 В избранное"; }
    localStorage.setItem("favs", JSON.stringify(favs));
}

function renderPage() {
    const id = parseInt(getParam("id"));
    const r = RECIPES.find(x => x.id === id);
    if (!r) { renderNotFound(); return; }

    document.title = r.title + " — Книга рецептов";

    const favs = JSON.parse(localStorage.getItem("favs")||"[]");
    const isFav = favs.includes(r.id);

    const similar = RECIPES.filter(x => x.cat === r.cat && x.id !== r.id).slice(0,4);

    document.getElementById("pageContent").innerHTML = `
        <div class="detail-wrap">
            <div>
                <img class="hero-img" src="${r.img}" alt="${r.title}">
            </div>
            <div class="hero-side">
                <h1 class="recipe-title">${r.title}</h1>
                <p class="recipe-desc">${r.desc}</p>
                <div class="stats">
                    <div class="stat-chip">⏱ ${r.time} минут</div>
                    <div class="stat-chip ${r.diff}">${r.diffLabel}</div>
                    <div class="stat-chip">🍽 ${r.ingredients.length} ингредиентов</div>
                    <div class="stat-chip">📝 ${r.steps.length} шагов</div>
                </div>
                <button class="fav-btn${isFav?' active':''}" id="favBtn" onclick="toggleFav(${r.id})">
                    ${isFav?'❤️ В избранном':'🤍 В избранное'}
                </button>
            </div>
        </div>

        <div class="full-section">
            <div class="section-card">
                <h2>🛒 Ингредиенты</h2>
                <ul class="ingredient-list">
                    ${r.ingredients.map(i => `
                        <li class="ingredient-item">
                            <span class="ingredient-name">${i.n}</span>
                            <span class="ingredient-amount">${i.a}</span>
                        </li>`).join("")}
                </ul>
            </div>
            <div class="section-card">
                <h2>👨‍🍳 Приготовление</h2>
                <ol class="step-list">
                    ${r.steps.map((s,i) => `
                        <li class="step-item">
                            <div class="step-num">${i+1}</div>
                            <div class="step-text">${s}</div>
                        </li>`).join("")}
                </ol>
            </div>
        </div>

        ${similar.length ? `
        <div class="similar-section">
            <h2>🍴 Похожие рецепты</h2>
            <div class="similar-grid">
                ${similar.map(s => `
                    <a href="detali.html?id=${s.id}" class="mini-card">
                        <img src="${s.img}" alt="${s.title}" loading="lazy">
                        <div class="mini-card-body">
                            <div class="mini-card-title">${s.title}</div>
                            <div class="mini-card-meta">⏱ ${s.time} мин &nbsp; ${s.diffLabel}</div>
                        </div>
                    </a>`).join("")}
            </div>
        </div>` : ""}
    `;
}

renderPage();
</script>
